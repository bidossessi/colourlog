default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy --strict
        entry: .venv/bin/mypy
        args: [colourlog, tests]
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: lint-imports
        name: lint-imports (Clean Arch contract)
        entry: .venv/bin/lint-imports
        language: system
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
