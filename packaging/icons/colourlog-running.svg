<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <mask id="cMask">
      <rect x="0" y="0" width="16" height="16" fill="white"/>
      <rect x="8" y="0" width="8" height="16" fill="black"/>
    </mask>
  </defs>
  <g fill="#2ec27e" mask="url(#cMask)">
    <!-- gear teeth -->
    <g transform="translate(8 8)">
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(45)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(90)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(135)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(180)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(225)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(270)"/>
      <rect x="-1.2" y="-8" width="2.4" height="2.2" rx="0.4" transform="rotate(315)"/>
    </g>
    <!-- ring (outer circle minus inner) -->
    <path d="M 8 1.5 A 6.5 6.5 0 1 1 8 14.5 A 6.5 6.5 0 1 1 8 1.5 Z M 8 4.2 A 3.8 3.8 0 1 0 8 11.8 A 3.8 3.8 0 1 0 8 4.2 Z" fill-rule="evenodd"/>
  </g>
  <!-- play triangle in the C opening -->
  <polygon points="7,5 7,11 12,8" fill="#2ec27e"/>
</svg>
